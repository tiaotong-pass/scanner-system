<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>系統已停用</title>
    <style>
        /* --- 風格設定 --- */
        body {
            margin: 0; padding: 0;
            background-color: #F0F0F0;
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
            border: 16px solid #231815;
            box-sizing: border-box;
        }

        /* --- 內容容器 --- */
        .content-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* --- Logo 區域 --- */
        #logo-container { margin-bottom: 30px; }
        #logo-img { width: 180px; height: auto; margin-bottom: 10px; min-height: 50px; }
        #logo-text { font-size: 14px; color: #59493F; letter-spacing: 1px; font-weight: bold; }

        /* --- 訊息卡片 --- */
        .message-box {
            background-color: #FFFFFF;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 80%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .alert-text {
            font-size: 18px;
            color: #C0392B; /* 使用紅色強調停用訊息 */
            font-weight: bold;
            line-height: 1.6;
        }

        /* --- 新系統導向按鈕 --- */
        .redirect-btn {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background-color: #1B9A4B; font-size: 18px; font-weight: bold; color: white;
            cursor: pointer; box-shadow: 0 4px 10px rgba(27, 154, 75, 0.3);
            transition: background-color 0.2s, transform 0.1s; 
            box-sizing: border-box;
            text-decoration: none; /* 確保作為連結沒有底線 */
            display: inline-block;
        }
        
        .redirect-btn:active { 
            background-color: #147A3B; 
            transform: scale(0.98); /* 點擊時的微縮放回饋 */
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div id="logo-container">
            <img id="logo-img" src="img/logo.png" alt="LOGO" onerror="this.style.opacity=0.3;">
            <div id="logo-text">臺北市條通商圈產業發展促進會</div>
        </div>

        <div class="message-box">
            <div class="alert-text">
                本系統已停用<br>請移駕至新掃描系統
            </div>
            
            <a href="https://tiaotong.binotalk.com/login" class="redirect-btn">點擊前往</a>
        </div>
    </div>
</body>
</html>
